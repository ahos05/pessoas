<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Nomes</title>
<link rel="stylesheet" href="style.css">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="container">
    <h1>Registro de Nomes</h1>
    <form id="registroForm">
        <input type="text" id="nome" placeholder="Digite o nome" required>
        <select id="cor" required>
            <option value="vermelho">Vermelho</option>
            <option value="amarelo">Amarelo</option>
            <option value="verde">Verde</option>
        </select>
        <input type="text" id="motivo" placeholder="Motivo" required>
        <button type="submit">Registrar</button>
    </form>

    <button id="verRegistros">Ver Registros</button>

    <div id="registrosContainer" class="hidden">
        <div class="filtros">
            <label>Filtrar por cor:
                <select id="filtroCor">
                    <option value="">Todas</option>
                    <option value="vermelho">Vermelho</option>
                    <option value="amarelo">Amarelo</option>
                    <option value="verde">Verde</option>
                </select>
            </label>
            <label>Ordenar por nome:
                <select id="ordenarNome">
                    <option value="asc">A-Z</option>
                    <option value="desc">Z-A</option>
                </select>
            </label>
        </div>
        <ul id="registrosList"></ul>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
